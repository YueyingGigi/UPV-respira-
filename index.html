<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UPV respira,</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #f7f5f0;
    font-family: 'Montserrat', sans-serif;
    color: #1a1a1a;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    position: relative;
    gap: 36px;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
    width: 100%;
    max-width: 340px;
    position: relative;
    z-index: 1;
  }

  /* LOGO */
  .logo {
    font-family: 'Montserrat', sans-serif;
    font-size: 17px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #4a7a68;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }
  .logo .upv { color: #d97762; font-weight: 500; }
  .logo .respira {
    text-transform: lowercase;
    letter-spacing: 2px;
  }

  /* ORB — CONCENTRIC RINGS */
  .orb-wrapper {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
    -webkit-tap-highlight-color: transparent;
  }

  .rings-svg {
    position: absolute;
    width: 100%;
    height: 100%;
    transition: transform 0.15s ease;
  }
  .orb-wrapper:active .rings-svg { transform: scale(0.96); }

  body.is-playing .rings-svg {
    animation: slowSpin 16s linear infinite;
  }
  @keyframes slowSpin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  body.is-playing .ring-path {
    animation: ringBreath 4s ease-in-out infinite;
  }
  body.is-playing .ring-path:nth-child(1) { animation-delay: 0s; }
  body.is-playing .ring-path:nth-child(2) { animation-delay: 0.4s; }
  body.is-playing .ring-path:nth-child(3) { animation-delay: 0.8s; }
  body.is-playing .ring-path:nth-child(4) { animation-delay: 1.2s; }
  body.is-playing .ring-path:nth-child(5) { animation-delay: 1.6s; }

  @keyframes ringBreath {
    0%, 100% { opacity: 0.9; }
    50% { opacity: 0.2; }
  }

  .orb-center {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 52px;
    height: 52px;
  }

  .icon-play  { font-size: 26px; color: #6aab94; padding-left: 4px; display: block; }
  .icon-pause { font-size: 22px; color: #6aab94; display: none; letter-spacing: -2px; }
  .icon-done  { font-size: 20px; color: #d97762; display: none; }

  body.is-playing .icon-play  { display: none; }
  body.is-playing .icon-pause { display: block; }
  body.is-playing .icon-done  { display: none; }

  body.is-finished .icon-play  { display: none; }
  body.is-finished .icon-pause { display: none; }
  body.is-finished .icon-done  { display: block; }
  body.is-finished .orb-wrapper { cursor: default; }

  /* AUDIO INFO */
  .audio-info {
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }
  .audio-title {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .audio-subtitle {
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(74,120,100,0.55);
  }

  .time-display {
    font-size: 12px;
    font-weight: 300;
    color: rgba(74,120,100,0.4);
    font-feature-settings: 'tnum';
    letter-spacing: 1px;
    min-height: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
    text-align: center;
  }

  .status-msg {
    font-size: 12px;
    font-weight: 300;
    font-style: italic;
    color: rgba(74,120,100,0.5);
    text-align: center;
    min-height: 18px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
    transition: color 0.5s;
    line-height: 1.6;
    letter-spacing: 0.3px;
  }
  .status-msg.done {
    color: #d97762;
    font-style: normal;
    font-weight: 400;
  }

  .error-box {
    display: none;
    font-size: 12px;
    color: rgba(200,80,60,0.8);
    text-align: center;
    padding: 10px 16px;
    border: 1px solid rgba(200,80,60,0.2);
    border-radius: 8px;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo"><span class="upv">UPV</span> <span class="respira">respira,</span></div>

  <div class="orb-wrapper" onclick="handlePlay()" role="button" aria-label="Reproducir audio">

    <svg class="rings-svg" viewBox="0 0 220 220" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="fadeTop" cx="50%" cy="50%" r="50%">
          <stop offset="0%"   stop-color="#f7f5f0" stop-opacity="0"/>
          <stop offset="55%"  stop-color="#f7f5f0" stop-opacity="0"/>
          <stop offset="80%"  stop-color="#f7f5f0" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#f7f5f0" stop-opacity="1"/>
        </radialGradient>
      </defs>

      <circle class="ring-path" cx="110" cy="110" r="100" stroke="#6aab94" stroke-width="1.2" stroke-opacity="0.85"/>
      <circle class="ring-path" cx="110" cy="110" r="88"  stroke="#6aab94" stroke-width="1.2" stroke-opacity="0.65"/>
      <circle class="ring-path" cx="110" cy="110" r="76"  stroke="#6aab94" stroke-width="1.2" stroke-opacity="0.45"/>
      <circle class="ring-path" cx="110" cy="110" r="64"  stroke="#6aab94" stroke-width="1.2" stroke-opacity="0.28"/>
      <circle class="ring-path" cx="110" cy="110" r="52"  stroke="#6aab94" stroke-width="1.2" stroke-opacity="0.14"/>

      <rect x="0"   y="0"   width="220" height="88"  fill="url(#fadeTop)" opacity="0.9"/>
      <rect x="0"   y="132" width="220" height="88"  fill="url(#fadeTop)" opacity="0.9"/>
    </svg>

    <div class="orb-center">
      <span class="icon-play">▶</span>
      <span class="icon-pause">⏸</span>
      <span class="icon-done">✦</span>
    </div>

  </div>

  <div class="audio-info">
    <div class="audio-title">Respiración consciente</div>
    <div class="audio-subtitle">Píldora de bienestar · Campus de Gandía</div>
  </div>

  <div class="time-display" id="timeDisplay"></div>
  <div class="status-msg"  id="statusMsg">Pulsa para comenzar</div>
  <div class="error-box"   id="errorBox">No se pudo cargar el audio.<br>Verifica tu conexión e inténtalo de nuevo.</div>

</div>

<audio id="player"
  src="https://silly-gaufre-76d2a0.netlify.app/Audio_upv_respira_demo.m4a"
  preload="auto">
</audio>

<script>
  var player   = document.getElementById('player');
  var timEl    = document.getElementById('timeDisplay');
  var statEl   = document.getElementById('statusMsg');
  var errEl    = document.getElementById('errorBox');
  var started  = false;
  var playing  = false;
  var finished = false;

  function fmt(s) {
    if (!s || isNaN(s)) return '';
    var m   = Math.floor(s / 60);
    var sec = ('0' + Math.floor(s % 60)).slice(-2);
    return m + ':' + sec;
  }

  player.addEventListener('loadedmetadata', function() {
    timEl.textContent = fmt(player.duration);
  });

  player.addEventListener('timeupdate', function() {
    if (player.duration) {
      timEl.textContent = fmt(player.currentTime) + ' / ' + fmt(player.duration);
    }
  });

  player.addEventListener('ended', function() {
    finished = true;
    playing  = false;
    document.body.classList.remove('is-playing');
    document.body.classList.add('is-finished');
    statEl.textContent = 'Gracias por tomarte este momento';
    statEl.classList.add('done');
    timEl.textContent  = '';
  });

  player.addEventListener('error', function() {
    errEl.style.display = 'block';
    statEl.textContent  = '';
    timEl.textContent   = '';
  });

  function handlePlay() {
    if (finished) return;
    if (!playing) {
      player.play().then(function() {
        playing = true;
        document.body.classList.add('is-playing');
        statEl.textContent = started
          ? 'Reproduciendo...'
          : 'Encuentra un lugar tranquilo y cierra los ojos';
        started = true;
      }).catch(function(e) {
        errEl.style.display = 'block';
        statEl.textContent  = '';
      });
    } else {
      player.pause();
      playing = false;
      document.body.classList.remove('is-playing');
      statEl.textContent = 'En pausa — pulsa para continuar';
    }
  }
</script>
</body>
</html>
