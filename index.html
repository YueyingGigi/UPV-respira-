<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>UPV respira,</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #0d1f18;
    font-family: 'DM Sans', sans-serif;
    color: #e8f4f0;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 24px;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, rgba(74,124,106,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(40,90,70,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 340px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    color: #8ab8a8;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.1s forwards;
  }
  .logo em { color: #6aab94; font-style: italic; }

  .orb-wrapper {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(106,171,148,0.15);
    animation: ringPulse 3s ease-in-out infinite;
    animation-play-state: paused;
  }
  .ring-1 { width: 180px; height: 180px; animation-delay: 0s; }
  .ring-2 { width: 215px; height: 215px; animation-delay: 0.6s; }
  .ring-3 { width: 250px; height: 250px; animation-delay: 1.2s; }

  body.is-playing .ring { animation-play-state: running; }

  @keyframes ringPulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.1; transform: scale(1.05); }
  }

  .orb {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #3a7a62 0%, #1a4a35 50%, #0d2e20 100%);
    border: 1px solid rgba(106,171,148,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .orb:active { transform: scale(0.96); }

  .orb-icon {
    font-size: 44px;
    line-height: 1;
    padding-left: 5px;
  }

  .wave-bars {
    display: none;
    align-items: center;
    gap: 5px;
    height: 40px;
  }
  .wave-bars span {
    display: block;
    width: 5px;
    background: #6aab94;
    border-radius: 3px;
    animation: waveAnim 1.2s ease-in-out infinite;
  }
  .wave-bars span:nth-child(1) { animation-delay: 0s;    height: 14px; }
  .wave-bars span:nth-child(2) { animation-delay: 0.15s; height: 28px; }
  .wave-bars span:nth-child(3) { animation-delay: 0.3s;  height: 40px; }
  .wave-bars span:nth-child(4) { animation-delay: 0.45s; height: 22px; }
  .wave-bars span:nth-child(5) { animation-delay: 0.6s;  height: 12px; }

  @keyframes waveAnim {
    0%, 100% { transform: scaleY(0.35); }
    50% { transform: scaleY(1); }
  }

  body.is-playing .orb-icon { display: none; }
  body.is-playing .wave-bars { display: flex; }

  body.is-finished .orb-icon { display: flex; font-size: 30px; padding-left: 0; }
  body.is-finished .wave-bars { display: none; }
  body.is-finished .orb { cursor: default; }

  .audio-info {
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.5s forwards;
  }
  .audio-title {
    font-size: 17px;
    font-weight: 500;
    color: #e8f4f0;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .audio-subtitle {
    font-size: 13px;
    color: rgba(168,204,192,0.55);
    font-weight: 300;
  }

  .time-display {
    font-size: 13px;
    color: rgba(168,204,192,0.4);
    font-feature-settings: 'tnum';
    letter-spacing: 0.5px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.7s forwards;
    min-height: 20px;
  }

  .status-msg {
    font-size: 13px;
    color: rgba(168,204,192,0.45);
    font-style: italic;
    font-weight: 300;
    text-align: center;
    min-height: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
    transition: color 0.5s;
    line-height: 1.5;
  }
  .status-msg.done {
    color: #6aab94;
    font-style: normal;
  }

  .error-box {
    display: none;
    font-size: 13px;
    color: rgba(220,120,100,0.85);
    text-align: center;
    padding: 12px 18px;
    border: 1px solid rgba(220,120,100,0.25);
    border-radius: 10px;
    line-height: 1.5;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo">UPV <em>respira,</em></div>

  <div class="orb-wrapper">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="orb" id="orbBtn" onclick="togglePlay()" role="button" aria-label="Reproducir audio de bienestar">
      <span class="orb-icon">▶</span>
      <div class="wave-bars" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="audio-info">
    <div class="audio-title">Respiración consciente</div>
    <div class="audio-subtitle">Píldora de bienestar · Campus de Gandía</div>
  </div>

  <div class="time-display" id="timeDisplay"></div>

  <div class="status-msg" id="statusMsg">Pulsa para comenzar</div>

  <div class="error-box" id="errorBox">
    No se pudo cargar el audio.<br>Verifica tu conexión e inténtalo de nuevo.
  </div>

</div>

<audio id="player" preload="auto" src="Audio_upv_respira_demo.m4a"></audio>

<script>
  const player = document.getElementById('player');
  const timEl  = document.getElementById('timeDisplay');
  const statEl = document.getElementById('statusMsg');
  const errEl  = document.getElementById('errorBox');
  let started  = false;

  function fmt(s) {
    if (!s || isNaN(s)) return '';
    const m   = Math.floor(s / 60);
    const sec = String(Math.floor(s % 60)).padStart(2, '0');
    return m + ':' + sec;
  }

  player.addEventListener('loadedmetadata', () => {
    timEl.textContent = fmt(player.duration);
  });

  player.addEventListener('timeupdate', () => {
    if (player.duration) {
      timEl.textContent = fmt(player.currentTime) + ' / ' + fmt(player.duration);
    }
  });

  player.addEventListener('ended', () => {
    document.body.classList.remove('is-playing');
    document.body.classList.add('is-finished');
    statEl.textContent = 'Gracias por tomarte este momento ✦';
    statEl.classList.add('done');
    document.querySelector('.orb-icon').textContent = '✦';
    timEl.textContent = '';
  });

  player.addEventListener('error', (e) => {
    errEl.style.display = 'block';
    statEl.textContent  = '';
    timEl.textContent   = '';
  });

  function togglePlay() {
    if (document.body.classList.contains('is-finished')) return;

    if (player.paused) {
      player.play().then(() => {
        document.body.classList.add('is-playing');
        statEl.textContent = started
          ? 'Reproduciendo...'
          : 'Encuentra un lugar tranquilo\ny cierra los ojos';
        started = true;
      }).catch((e) => {
        errEl.style.display = 'block';
        statEl.textContent  = '';
      });
    } else {
      player.pause();
      document.body.classList.remove('is-playing');
      statEl.textContent = 'En pausa — pulsa para continuar';
    }
  }
</script>
</body>
</html>
